# Flaky CI Workflow Demo
# Produces F→S transitions when manually rerun after a flaky failure.

name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  unit-tests:
    name: Tests (${{ matrix.os }}, JDK ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: ["11", "17", "21"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Run tests
        run: mvn test -B

  notify-on-failure:
    name: Notify on failure
    needs: [unit-tests]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Log failure
        run: echo "::warning::Build failed — may be flaky, consider re-running"
