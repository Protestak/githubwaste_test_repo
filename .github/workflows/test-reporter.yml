name: test-reporter 

on:
  workflow_run:
    workflows: ["main-ci"]
    types: [completed] 

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: test-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "Report done"
